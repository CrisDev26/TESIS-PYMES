<aside class="sidebar" [class.sidebar--collapsed]="collapsed" aria-label="Barra lateral de navegación">
  <div class="sidebar__header">
    <button type="button" class="icon-btn" (click)="toggleSidebar()" [attr.aria-expanded]="!collapsed" aria-label="Alternar barra lateral">
      <i class="fas fa-bars"></i>
    </button>
  </div>

  <nav class="sidebar__nav" role="navigation">
    <ul class="menu" #menuRef (mouseleave)="onMenuLeave()">
      <div class="hover-indicator" [style.transform]="hoverTransform" [style.height.px]="hoverHeight" [style.opacity]="hoverVisible ? 1 : 0"></div>

      <li class="menu__item">
        <a class="menu__link" [routerLink]="'/home'" routerLinkActive="menu__link--active" [routerLinkActiveOptions]="{ exact: true }" (mouseenter)="onItemEnter($event)">
          <i class="fas fa-home"></i>
          <span class="menu__text" *ngIf="!collapsed">Inicio</span>
        </a>
      </li>

      <li class="menu__item" [class.menu__item--open]="open.ventas">
        <button type="button" class="menu__link" (click)="toggle('ventas')" [attr.aria-expanded]="open.ventas" (mouseenter)="onItemEnter($event)">
          <i class="fas fa-shopping-cart"></i>
          <span class="menu__text" *ngIf="!collapsed">Ventas</span>
          <i class="fas fa-chevron-down menu__chevron" *ngIf="!collapsed" [class.rotate]="open.ventas"></i>
        </button>
        <ul class="submenu" [style.maxHeight]="open.ventas && !collapsed ? '500px' : '0px'" [attr.aria-hidden]="!(open.ventas && !collapsed)">
          <li><a href="#" class="submenu__link">Pedidos</a></li>
          <li><a href="#" class="submenu__link">Clientes</a></li>
          <li><a href="#" class="submenu__link">Facturas</a></li>
        </ul>
      </li>

      <li class="menu__item" [class.menu__item--open]="open.inventario">
        <button type="button" class="menu__link" (click)="toggle('inventario')" [attr.aria-expanded]="open.inventario" (mouseenter)="onItemEnter($event)">
          <i class="fas fa-boxes"></i>
          <span class="menu__text" *ngIf="!collapsed">Inventario</span>
          <i class="fas fa-chevron-down menu__chevron" *ngIf="!collapsed" [class.rotate]="open.inventario"></i>
        </button>
        <ul class="submenu" [style.maxHeight]="open.inventario && !collapsed ? '500px' : '0px'" [attr.aria-hidden]="!(open.inventario && !collapsed)">
          <li><a href="#" class="submenu__link">Productos</a></li>
          <li><a href="#" class="submenu__link">Categorías</a></li>
        </ul>
      </li>

      <li class="menu__item" [class.menu__item--open]="open.reportes">
        <button type="button" class="menu__link" (click)="toggle('reportes')" [attr.aria-expanded]="open.reportes" (mouseenter)="onItemEnter($event)">
          <i class="fas fa-chart-line"></i>
          <span class="menu__text" *ngIf="!collapsed">Reportes</span>
          <i class="fas fa-chevron-down menu__chevron" *ngIf="!collapsed" [class.rotate]="open.reportes"></i>
        </button>
        <ul class="submenu" [style.maxHeight]="open.reportes && !collapsed ? '500px' : '0px'" [attr.aria-hidden]="!(open.reportes && !collapsed)">
          <li><a href="#" class="submenu__link">Mensuales</a></li>
          <li><a href="#" class="submenu__link">Anuales</a></li>
        </ul>
      </li>
    </ul>
  </nav>
</aside>
